name: BOR Solr Updater CD

on:
  # Manual for now
  # push:
  #   branches:
  #     - main
  #     - feature*
  #     - hotfix*
  #   paths:
  #     - "queue-services/bor-solr-updater/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy To"
        required: true
        type: choice
        options:
          - "dev"
          - "test"
          - "sandbox"
          - "prod"
      redeploy:
        description: "Redeploy Application"
        required: true
        type: choice
        options:
          - "false"
          - "true"

jobs:
  bor-updater-cd:
    permissions:
      contents: "read"
      id-token: "write"
      
    uses: bcgov/bcregistry-sre/.github/workflows/backend-cd.yaml@main
    with:
      target: ${{ inputs.target }}
      app_name: "bor-solr-updater"
      working_directory: "./queue-services/bor-solr-updater"
      redeploy: ${{ inputs.redeploy }}
    secrets:
      WORKLOAD_IDENTIFY_POOLS_PROVIDER: ${{ secrets.WORKLOAD_IDENTIFY_POOLS_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
