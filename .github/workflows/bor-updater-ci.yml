name: BOR Solr Updater CI

on:
  pull_request:
    types: [assigned, synchronize]
    paths:
      - "queue-services/bor-solr-updater/**"

defaults:
  run:
    shell: bash
    working-directory: ./queue-services/bor-solr-updater

jobs:
  setup-job:
    runs-on: ubuntu-20.04

    if: github.repository == 'bcgov-registries/beneficial-ownership'
    
    steps:
      - uses: actions/checkout@v3
      - run: "true"

  linting:
    needs: setup-job
    runs-on: ubuntu-20.04

    strategy:
      matrix:
        python-version: [3.8]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          make setup
      - name: Lint with pylint
        id: pylint
        run: |
          make pylint
      - name: Lint with flake8
        id: flake8
        run: |
          make flake8

  testing:
    needs: setup-job
    env:
      POD_NAMESPACE: ci
      NATS_SERVERS: localhost:4222
      NATS_CLUSTER_ID: test-cluster
      STAN_CLUSTER_NAME: test-cluster
      NATS_ENTITY_EVENTS_CLIENT_NAME: entity.events.tester
      NATS_ENTITY_EVENTS_SUBJECT: entity.events
      NATS_ENTITY_EVENTS_QUEUE: entity-worker
      RUN_NATS_TESTS: True

    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          make setup
      - name: Test with pytest
        id: test
        run: |
          make test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./queue-services/bor-solr-updater/coverage.xml
          flags: bor-solr-updater
          name: codecov-bor-solr-updater
          fail_ci_if_error: false

  build-check:
    needs: setup-job
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v3
      - name: build to check strictness
        id: build
        run: |
          make build-nc
